<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pit Burguer - Cardápio Digital</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header class="main-header">
        <div class="logo-circle">PB</div>
        <h1 class="brand-name">PIT <span>BURGUER</span></h1>
        <p class="brand-info">🍔 Os melhores blends de Paragominas</p>
        <p class="brand-info">📍 Aberto até às 23:30</p>
    </header>

    <nav id="nav-categorias"></nav>

    <main id="menu-container"></main>

    <div class="floating-cart" id="floating-cart" onclick="abrirCheckout()">
        <span>🛒 <span id="cart-count">0</span> ITENS</span>
        <span id="cart-total">R$ 0,00</span>
    </div>

    <div class="overlay" id="overlay" onclick="fecharModais()"></div>

    <div class="bottom-sheet" id="modal-produto">
        <h2 id="modal-title" style="color:#fff"></h2>
        <p id="modal-desc" class="card-desc"></p>
        
        <div id="section-addons">
            <label>ADICIONAR EXTRAS?</label>
            <div id="modal-addons"></div>
        </div>
        <div id="section-addons">
            <label>ADICIONAR EXTRAS?</label>
            <div id="modal-addons"></div>
        </div>

        <div id="section-sabores" style="display: none;">
            <label>ESCOLHA O SABOR</label>
            <div id="modal-sabores"></div>
        </div>


        <label>OBSERVAÇÕES</label>
        <textarea id="modal-obs" placeholder="Ex: Tirar cebola, ponto da carne..."></textarea>
        
        <button class="btn-action btn-gold" onclick="adicionarAoCarrinho()">
            ADICIONAR AO CARRINHO • <span id="modal-btn-price"></span>
        </button>
    </div>

    <div class="bottom-sheet" id="modal-checkout">
        <h2 style="color:#fff">SEU PEDIDO</h2>
        <div id="checkout-resumo"></div>
        
        <label>NOME COMPLETO</label>
        <input type="text" id="cliente-nome" placeholder="Como te chamamos?">
        
        <label>ENDEREÇO DE ENTREGA</label>
        <input type="text" id="cliente-endereco" placeholder="Rua, número e bairro">
        
        <label>FORMA DE PAGAMENTO</label>
        <select id="cliente-pagamento">
            <option value="Pix">Pix (Rápido)</option>
            <option value="Cartão de Crédito">Cartão de Crédito</option>
            <option value="Cartão de Débito">Cartão de Débito</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        
        <button class="btn-action btn-green" onclick="enviarWhatsApp()">
            FINALIZAR NO WHATSAPP
        </button>
    </div>
    <script src="script.js" charset="UTF-8"></script>
</body>
</html>
